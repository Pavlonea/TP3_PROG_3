<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Personas</title>

<body>

<h1>Personas</h1>

<form id="formulario">

<input id="nombre" placeholder="Nombre">

<input id="apellido" placeholder="Apellido">

<input id="edad" type="number" placeholder="Edad">

<input id="altura" type="number" step="0.01" placeholder="Altura">

<input id="peso" type="number" placeholder="Peso">

<button>Agregar</button>

</form>

<table>

<thead>

<tr>

<th>Nombre</th>

<th>Apellido</th>

<th>Edad</th>

<th>Altura</th>

<th>Peso</th>

<th>IMC</th>

<th>Acción</th>

</tr>

</thead>

<tbody id="tabla">

</tbody>

</table>

<script src="js/personas.js"></script>

</body>

</html>
